version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qrose-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qrose
    ports:
      - "5432:5432"
    volumes:
      - qrose_pg_data:/var/lib/postgresql/data

volumes:
  qrose_pg_data:
